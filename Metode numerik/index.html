<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Newton-Raphson Deforestasi
  </title>

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="style.css"
  >

  <!-- Chart JS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

  <!-- ================================ -->
  <!-- HEADER -->
  <!-- ================================ -->

  <header>

    <h1>
      🌿 Dashboard Deforestasi Kalimantan
    </h1>

    <p>
      Metode Newton-Raphson
      Model Polinomial
    </p>

  </header>

  <!-- ================================ -->
  <!-- CONTAINER -->
  <!-- ================================ -->

  <main class="container">

    <!-- ============================ -->
    <!-- FORM INPUT -->
    <!-- ============================ -->

    <section class="card">

      <h2>
        Input Data
      </h2>

      <div class="grid">

        <div>

          <label>
            Hutan Awal (H0)
          </label>

          <input
            type="number"
            id="h0"
            value="40.8"
          >

        </div>

        <div>

          <label>
            Hutan Target (Ht)
          </label>

          <input
            type="number"
            id="ht"
            value="33.5"
          >

        </div>

        <div>

          <label>
            Selang Waktu
          </label>

          <input
            type="number"
            id="t"
            value="15"
          >

        </div>

        <div>

          <label>
            Tebakan Awal r
          </label>

          <input
            type="number"
            id="r0"
            value="0.01"
            step="0.001"
          >

        </div>

      </div>

      <button onclick="hitungNewton()">

        Hitung Sekarang

      </button>

    </section>

    <!-- ============================ -->
    <!-- HASIL -->
    <!-- ============================ -->

    <section class="card">

      <div id="hasilNewton">

      </div>

    </section>

    <!-- ============================ -->
    <!-- TABEL ITERASI -->
    <!-- ============================ -->

    <section class="card">

      <h2>

        Tabel Iterasi

      </h2>

      <div class="table-container">

        <table>

          <thead>

            <tr>

  <th>
    Iterasi
  </th>

  <th>
    xi
  </th>

  <th>
    f(xi)
  </th>

  <th>
    f'(xi)
  </th>

  <th>
    xi+1
  </th>

  <th>
    Error Relatif
  </th>

  <th>
    Status
  </th>

</tr>
          </thead>

          <tbody id="tableNewton">

          </tbody>

        </table>

      </div>

    </section>

    <!-- ============================ -->
    <!-- GRAFIK -->
    <!-- ============================ -->

    <section class="card">

      <h2>

        Grafik Konvergensi

      </h2>

      <canvas id="chartNewton">

      </canvas>

    </section>

    <!-- ============================ -->
    <!-- TABEL PROYEKSI -->
    <!-- ============================ -->

    <section class="card">

      <h2>

        Proyeksi Hutan per Tahun

      </h2>

      <div class="table-container">

        <table>

          <thead>

            <tr>

              <th>
                Tahun
              </th>

              <th>
                Luas Hutan
              </th>

              <th>
                Penurunan
              </th>

            </tr>

          </thead>

          <tbody id="tabelProyeksi">

          </tbody>

        </table>

      </div>

    </section>

  </main>

  <!-- JS -->
  <script src="script.js"></script>

</body>

</html>
